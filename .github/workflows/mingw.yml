name: Build Windows

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-mangohud:
    name: Build MangoHud (MinGW cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            meson ninja-build \
            glslang-tools \
            python3-mako

      - name: Configure
        run: meson setup build64 --cross-file mingw64.txt

      - name: Build
        run: ninja -C build64

      - name: Upload MangoHud artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mangohud-dlls
          path: |
            build64/src/dxgi.dll
            build64/src/libMangoHud.dll
            build64/src/MangoHud.x86_64.json

  build-mangojuice:
    name: Build MangoJuice (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout MangoJuice submodule
        shell: bash
        run: git submodule update --init mangojuice

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-vala
            mingw-w64-x86_64-libgee
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Build MangoJuice
        run: |
          cd mangojuice
          meson setup build
          ninja -C build

      - name: Bundle MangoJuice with GTK4 runtime
        run: |
          mkdir -p bundle
          cp mangojuice/build/src/mangojuice.exe bundle/MangoJuice.exe

          # Bundle required DLLs using ldd to find them
          for dll in $(ldd bundle/MangoJuice.exe | grep mingw64 | awk '{print $3}'); do
            cp "$dll" bundle/
          done

          # Bundle GLib schemas
          mkdir -p bundle/share/glib-2.0/schemas
          cp /mingw64/share/glib-2.0/schemas/gschemas.compiled bundle/share/glib-2.0/schemas/ 2>/dev/null || true

          # Bundle Adwaita icons
          mkdir -p bundle/share/icons
          cp -r /mingw64/share/icons/Adwaita bundle/share/icons/ 2>/dev/null || true
          cp -r /mingw64/share/icons/hicolor bundle/share/icons/ 2>/dev/null || true

          # Bundle GDK pixbuf loaders
          mkdir -p bundle/lib/gdk-pixbuf-2.0
          cp -r /mingw64/lib/gdk-pixbuf-2.0/* bundle/lib/gdk-pixbuf-2.0/ 2>/dev/null || true

          # GTK settings for Windows
          mkdir -p bundle/etc/gtk-4.0
          echo '[Settings]' > bundle/etc/gtk-4.0/settings.ini
          echo 'gtk-theme-name=Adwaita' >> bundle/etc/gtk-4.0/settings.ini

      - name: Upload MangoJuice bundle
        uses: actions/upload-artifact@v4
        with:
          name: mangojuice-bundle
          path: bundle/

  package-and-release:
    name: Package and release
    needs: [build-mangohud, build-mangojuice]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download MangoHud DLLs
        uses: actions/download-artifact@v4
        with:
          name: mangohud-dlls
          path: release/

      - name: Download MangoJuice bundle
        uses: actions/download-artifact@v4
        with:
          name: mangojuice-bundle
          path: release/

      - name: Organize release
        run: |
          cd release
          # Flatten MangoHud outputs
          mv build64/src/dxgi.dll . 2>/dev/null || true
          mv build64/src/libMangoHud.dll MangoHud.dll 2>/dev/null || true
          mv build64/src/MangoHud.x86_64.json . 2>/dev/null || true
          rm -rf build64

          # Copy config examples
          cp ../data/MangoHud.conf MangoHud.conf.example 2>/dev/null || true
          cp ../data/presets.conf presets.conf.example 2>/dev/null || true

          # Create readme
          cat > README.txt << 'ENDREADME'
          MangoHud for Windows
          ====================

          Quick start:
          1. Run MangoJuice.exe (accept the admin prompt)
          2. Go to the Games tab
          3. Click "Register Vulkan Layer" for Vulkan games (CS2, Doom, etc)
          4. Click "Add Game" and pick your game's .exe
          5. Click "Enable" for DirectX games
          6. Launch the game - the overlay will appear

          MangoJuice needs admin to register the Vulkan layer in the
          Windows Registry. DirectX proxy deployment does not need admin.

          Manual setup:
          - Copy dxgi.dll next to your game's .exe for DirectX games
          - For Vulkan: add MangoHud.x86_64.json to
            HKLM\SOFTWARE\Khronos\Vulkan\ImplicitLayers (DWORD value 0)
            and set MANGOHUD=1 as a system environment variable

          Configuration:
          - Edit MangoHud.conf in %APPDATA%\MangoHud\
          - Or use MangoJuice.exe for a graphical editor
          ENDREADME

      - name: Create zip
        run: cd release && zip -r ../MangoHud-Windows-x64.zip .

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete previous latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.sha.outputs.short }})"
          body: |
            Automatic build from commit ${{ github.sha }}

            **How to use:**
            1. Download and extract `MangoHud-Windows-x64.zip`
            2. Run `MangoJuice.exe` (accept admin prompt)
            3. Go to Games tab, add your games, click Enable
            4. For Vulkan games (CS2, etc), click "Register Vulkan Layer"

            This release is updated on every push to master.
          files: MangoHud-Windows-x64.zip
          prerelease: true
          make_latest: true

      - name: Upload artifact too
        uses: actions/upload-artifact@v4
        with:
          name: MangoHud-Windows-x64
          path: release/

  tagged-release:
    name: Create tagged release
    needs: [build-mangohud, build-mangojuice]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download MangoHud DLLs
        uses: actions/download-artifact@v4
        with:
          name: mangohud-dlls
          path: release/

      - name: Download MangoJuice bundle
        uses: actions/download-artifact@v4
        with:
          name: mangojuice-bundle
          path: release/

      - name: Organize release
        run: |
          cd release
          mv build64/src/dxgi.dll . 2>/dev/null || true
          mv build64/src/libMangoHud.dll MangoHud.dll 2>/dev/null || true
          mv build64/src/MangoHud.x86_64.json . 2>/dev/null || true
          rm -rf build64
          cp ../data/MangoHud.conf MangoHud.conf.example 2>/dev/null || true
          cp ../data/presets.conf presets.conf.example 2>/dev/null || true

      - name: Create zip
        run: cd release && zip -r ../MangoHud-Windows-x64.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: MangoHud-Windows-x64.zip
          generate_release_notes: true
